name: Release
on:
  push:
    tags:
      - "v*"
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests with race detector
        run: go test -v -race -coverprofile=coverage.out ./...
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
  goreleaser:
    needs: [test, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run goreleaser (正式リリース)
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      - name: Run goreleaser (snapshot)
        if: github.ref == 'refs/heads/main'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-floating-tags:
    name: Update floating version tags
    needs: goreleaser
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update v{major} and v{major}.{minor} tags
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # v0.5.1 → MAJOR=v0, MINOR=v0.5
          MAJOR=$(echo "${TAG}" | grep -oP '^v\d+')
          MINOR=$(echo "${TAG}" | grep -oP '^v\d+\.\d+')

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -f "${MAJOR}" "${GITHUB_SHA}"
          git tag -f "${MINOR}" "${GITHUB_SHA}"
          git push -f origin "${MAJOR}" "${MINOR}"

          echo "Updated tags: ${MAJOR}, ${MINOR} → ${TAG} (${GITHUB_SHA})"
